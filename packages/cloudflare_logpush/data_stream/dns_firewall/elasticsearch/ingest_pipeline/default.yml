---
description: Pipeline for parsing Cloudflare DNS Firewall logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.kind
      value: event
  - set:
      field: event.category
      value: [network]
  - set:
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  # Timestamp
  - convert:
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.dns_firewall.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true

  # Handle source IP
  - convert:
      field: json.SourceIP
      target_field: cloudflare_logpush.dns_firewall.source.ip
      if: ctx.json?.SourceIP != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      copy_from: cloudflare_logpush.dns_firewall.source.ip
      ignore_empty_value: true
  # Geo enrichment (source IP)
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true

  # DNS ECS fields
  - rename:
      field: json.QueryName
      target_field: cloudflare_logpush.dns_firewall.question.name
      ignore_missing: true
  - set:
      field: dns.question.name
      copy_from: cloudflare_logpush.dns_firewall.question.name
      ignore_empty_value: true

  - convert:
      field: json.ClientResponseCode
      target_field: cloudflare_logpush.dns_firewall.response.code
      type: string
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.UpstreamResponseCode
      target_field: cloudflare_logpush.dns_firewall.upstream.response_code
      type: string
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      lang: painless
      params:
        "0": NoError
        "1": FormErr
        "2": ServFail
        "3": NXDomain
        "4": NotImp
        "5": Refused
        "6": YXDomain
        "7": YXRRSet
        "8": NXRRSet
        "9": NotAuth
        "10": NotZone
        "11": DSOTYPENI
        "16": BADVERS
        "17": BADKEY
        "18": BADTIME
        "19": BADMODE
        "20": BADNAME
        "21": BADALG
        "22": BADTRUNC
        "23": BADCOOKIE
      source: >-
        ctx.dns = ctx.dns ?: [:];
        def code1 = ctx.cloudflare_logpush?.dns_firewall?.response?.code;
        def code2 = ctx.cloudflare_logpush?.dns_firewall?.upstream?.response_code;
        if (code1 != null && params.containsKey(code1)) {
          ctx.dns.response_code = params[code1];
        } else if (code2 != null && params.containsKey(code2)) {
          ctx.dns.response_code = params[code2];
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Custom fields
  - rename:
      field: json.ClusterID
      target_field: cloudflare_logpush.dns_firewall.cluster_id
      ignore_missing: true
  - rename:
      field: json.ColoCode
      target_field: cloudflare_logpush.dns_firewall.colo.code
      ignore_missing: true
  - convert:
      field: json.EDNSSubnet
      target_field: cloudflare_logpush.dns_firewall.edns.subnet
      if: ctx.json?.EDNSSubnet != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.EDNSSubnetLength
      target_field: cloudflare_logpush.dns_firewall.edns.subnet_length
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QueryDO
      target_field: cloudflare_logpush.dns_firewall.question.dnssec_ok
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QueryRD
      target_field: cloudflare_logpush.dns_firewall.question.recursion_desired
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QuerySize
      target_field: cloudflare_logpush.dns_firewall.question.size
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.QueryTCP
      target_field: cloudflare_logpush.dns_firewall.question.tcp
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: network.transport
      value: tcp
      if: ctx.cloudflare_logpush?.dns_firewall?.question?.tcp == true
  - set:
      field: network.transport
      value: udp
      if: ctx.cloudflare_logpush?.dns_firewall?.question?.tcp == false
  - convert:
      field: json.QueryType
      target_field: cloudflare_logpush.dns_firewall.question.type
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      lang: painless
      if: ctx.cloudflare_logpush?.dns_firewall?.question?.type != null
      params:
        "0": Reserved
        "1": A
        "2": NS
        "3": MD
        "4": MF
        "5": CNAME
        "6": SOA
        "7": MB
        "8": MG
        "9": MR
        "10": "NULL"
        "11": WKS
        "12": PTR
        "13": HINFO
        "14": MINFO
        "15": MX
        "16": TXT
        "17": RP
        "18": AFSDB
        "19": X25
        "20": ISDN
        "21": RT
        "22": NSAP
        "23": NSAP-PTR
        "24": SIG
        "25": KEY
        "26": PX
        "27": GPOS
        "28": AAAA
        "29": LOC
        "30": NXT
        "31": EID
        "32": NIMLOC
        "33": SRV
        "34": ATMA
        "35": NAPTR
        "36": KX
        "37": CERT
        "38": A6
        "39": DNAME
        "40": SINK
        "41": OPT
        "42": APL
        "43": DS
        "44": SSHFP
        "45": IPSECKEY
        "46": RRSIG
        "47": NSEC
        "48": DNSKEY
        "49": DHCID
        "50": NSEC3
        "51": NSEC3PARAM
        "52": TLSA
        "53": SMIMEA
        "55": HIP
        "56": NINFO
        "57": RKEY
        "58": TALINK
        "59": CDS
        "60": CDNSKEY
        "61": OPENPGPKEY
        "62": CSYNC
        "63": ZONEMD
        "64": SVCB
        "65": HTTPS
        "66": DSYNC
        "67": HHIT
        "68": BRID
        "99": SPF
        "100": UINFO
        "101": UID
        "102": GID
        "103": UNSPEC
        "104": NID
        "105": L32
        "106": L64
        "107": LP
        "108": EUI48
        "109": EUI64
        "128": NXNAME
        "249": TKEY
        "250": TSIG
        "251": IXFR
        "252": AXFR
        "253": MAILB
        "254": MAILA
        "255": ANY
        "256": URI
        "257": CAA
        "258": AVC
        "259": DOA
        "260": AMTRELAY
        "261": RESINFO
        "262": WALLET
        "263": CLA
        "264": IPN
        "32768": TA
        "32769": DLV
      source: >-
        def queryType = String.valueOf(ctx.cloudflare_logpush.dns_firewall.question.type);
        ctx.dns = ctx.dns ?: [:];
        ctx.dns.question = ctx.dns.question ?: [:];
        if (params.containsKey(queryType)) {
          ctx.dns.question.type = params[queryType];
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.ResponseCached
      target_field: cloudflare_logpush.dns_firewall.response.cached
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.ResponseReason
      target_field: cloudflare_logpush.dns_firewall.response.reason
      ignore_missing: true
  - convert:
      field: json.ResponseCachedStale
      target_field: cloudflare_logpush.dns_firewall.response.cached_stale
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.UpstreamIP
      target_field: cloudflare_logpush.dns_firewall.upstream.ip
      if: ctx.json?.UpstreamIP != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.UpstreamResponseTimeMs
      target_field: cloudflare_logpush.dns_firewall.upstream.response_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Create related fields
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.dns_firewall.source.ip}}}'
      if: ctx.cloudflare_logpush?.dns_firewall?.source?.ip != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.dns_firewall.edns.subnet}}}'
      if: ctx.cloudflare_logpush?.dns_firewall?.edns?.subnet != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.dns_firewall.upstream.ip}}}'
      if: ctx.cloudflare_logpush?.dns_firewall?.upstream?.ip != null
      allow_duplicates: false

  # Clean resulting event
  - remove:
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.dns_firewall.timestamp
        - cloudflare_logpush.dns_firewall.source.ip
        - cloudflare_logpush.dns_firewall.question.name
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_failure: true
      ignore_missing: true
  - script:
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
