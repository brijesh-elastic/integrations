---
description: Pipeline for parsing Email Security Alerts logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.category
      value: [email, network]
  - set:
      field: event.kind
      value: event
  - set:
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.email_security_alerts.timestamp
      copy_from: '@timestamp'
      ignore_empty_value: true
  - rename:
      field: json.AlertID
      target_field: cloudflare_logpush.email_security_alerts.alert_id
      ignore_missing: true
  - rename:
      field: json.AlertReasons
      target_field: cloudflare_logpush.email_security_alerts.alert_reasons
      ignore_missing: true
  - rename:
      field: json.Attachments
      target_field: cloudflare_logpush.email_security_alerts.attachments
      ignore_missing: true
  - rename:
      field: json.CC
      target_field: cloudflare_logpush.email_security_alerts.cc
      ignore_missing: true
  - foreach:
      field: cloudflare_logpush.email_security_alerts.cc
      if: ctx.cloudflare_logpush?.email_security_alerts?.cc instanceof List
      processor:
        append:
          field: email.cc.address
              value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - rename:
      field: json.CCName
      target_field: cloudflare_logpush.email_security_alerts.cc_name
      ignore_missing: true
  - rename:
      field: json.FinalDisposition
      target_field: cloudflare_logpush.email_security_alerts.final_disposition
      ignore_missing: true
  - rename:
      field: json.From
      target_field: cloudflare_logpush.email_security_alerts.from
      ignore_missing: true
  - append:
      field: email.from.address
      value: '{{{cloudflare_logpush.email_security_alerts.from}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.from != null
      allow_duplicates: false
  - rename:
      field: json.FromName
      target_field: cloudflare_logpush.email_security_alerts.from_name
      ignore_missing: true
  - rename:
      field: json.Links
      target_field: cloudflare_logpush.email_security_alerts.links
      ignore_missing: true
  - rename:
      field: json.MessageDeliveryMode
      target_field: cloudflare_logpush.email_security_alerts.message_delivery_mode
      ignore_missing: true
  - rename:
      field: json.MessageID
      target_field: cloudflare_logpush.email_security_alerts.message_id
      ignore_missing: true
  - set:
      field: email.message_id
      copy_from: cloudflare_logpush.email_security_alerts.message_id
      ignore_empty_value: true
  - rename:
      field: json.Origin
      target_field: cloudflare_logpush.email_security_alerts.origin
      ignore_missing: true
  - rename:
      field: json.OriginalSender
      target_field: cloudflare_logpush.email_security_alerts.original_sender
      ignore_missing: true
  - rename:
      field: json.ReplyTo
      target_field: cloudflare_logpush.email_security_alerts.reply_to
      ignore_missing: true
  - append:
      field: email.reply_to.address
      value: '{{{cloudflare_logpush.email_security_alerts.reply_to}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.reply_to != null
      allow_duplicates: false
  - rename:
      field: json.ReplyToName
      target_field: cloudflare_logpush.email_security_alerts.reply_to_name
      ignore_missing: true
  - rename:
      field: json.SMTPEnvelopeFrom
      target_field: cloudflare_logpush.email_security_alerts.smtp_envelope_from
      ignore_missing: true
  - set:
      field: email.sender.address
      copy_from: cloudflare_logpush.email_security_alerts.smtp_envelope_from
      ignore_empty_value: true
  - rename:
      field: json.SMTPEnvelopeTo
      target_field: cloudflare_logpush.email_security_alerts.smtp_envelope_to
      ignore_missing: true
  - convert:
      field: json.SMTPHeloServerIP
      target_field: cloudflare_logpush.email_security_alerts.smtp_helo_server_ip
      if: ctx.json?.SMTPHeloServerIP != ''
      type: ip
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.SMTPHeloServerIPAsName
      target_field: cloudflare_logpush.email_security_alerts.smtp_helo_server_ip_as_name
      ignore_missing: true
  - rename:
      field: json.SMTPHeloServerIPAsNumber
      target_field: cloudflare_logpush.email_security_alerts.smtp_helo_server_ip_as_number
      ignore_missing: true
  - rename:
      field: json.SMTPHeloServerIPGeo
      target_field: cloudflare_logpush.email_security_alerts.smtp_helo_server_ip_geo
      ignore_missing: true
  - rename:
      field: json.SMTPHeloServerName
      target_field: cloudflare_logpush.email_security_alerts.smtp_helo_server_name
      ignore_missing: true
  - rename:
      field: json.Subject
      target_field: cloudflare_logpush.email_security_alerts.subject
      ignore_missing: true
  - set:
      field: email.subject
      copy_from: cloudflare_logpush.email_security_alerts.subject
      ignore_empty_value: true
  - rename:
      field: json.ThreatCategories
      target_field: cloudflare_logpush.email_security_alerts.threat_categories
      ignore_missing: true
  - rename:
      field: json.To
      target_field: cloudflare_logpush.email_security_alerts.to
      ignore_missing: true
  - foreach:
      field: cloudflare_logpush.email_security_alerts.to
      if: ctx.cloudflare_logpush?.email_security_alerts?.to instanceof List
      processor:
        append:
          field: email.to.address
              value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - rename:
      field: json.ToName
      target_field: cloudflare_logpush.email_security_alerts.to_name
      ignore_missing: true
  - set:
      field: event.kind
      value: alert
      if: ctx.cloudflare_logpush?.email_security_alerts?.final_disposition != null && ctx.cloudflare_logpush.email_security_alerts.final_disposition != 'unset'
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.email_security_alerts.from}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.from != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.email_security_alerts.from_name}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.from_name != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.email_security_alerts.smtp_envelope_from}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.smtp_envelope_from != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.email_security_alerts.original_sender}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.original_sender != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.email_security_alerts.reply_to}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.reply_to != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.email_security_alerts.reply_to_name}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.reply_to_name != null
      allow_duplicates: false
  - foreach:
      field: cloudflare_logpush.email_security_alerts.to
      if: ctx.cloudflare_logpush?.email_security_alerts?.to instanceof List
      processor:
        append:
          field: related.user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: cloudflare_logpush.email_security_alerts.smtp_envelope_to
      if: ctx.cloudflare_logpush?.email_security_alerts?.smtp_envelope_to instanceof List
      processor:
        append:
          field: related.user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: cloudflare_logpush.email_security_alerts.to_name
      if: ctx.cloudflare_logpush?.email_security_alerts?.to_name instanceof List
      processor:
        append:
          field: related.user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: cloudflare_logpush.email_security_alerts.cc
      if: ctx.cloudflare_logpush?.email_security_alerts?.cc instanceof List
      processor:
        append:
          field: related.user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - foreach:
      field: cloudflare_logpush.email_security_alerts.cc_name
      if: ctx.cloudflare_logpush?.email_security_alerts?.cc_name instanceof List
      processor:
        append:
          field: related.user
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
  - set:
      field: server.address
      copy_from: cloudflare_logpush.email_security_alerts.smtp_helo_server_name
      ignore_empty_value: true
  - convert:
      field: server.address
      target_field: _tmp.server_ip
      if: ctx.server?.address != ''
      type: ip
      ignore_missing: true
      on_failure:
        - set:
                  field: server.domain
            copy_from: server.address
            ignore_empty_value: true
  - set:
      field: _tmp.links
      copy_from: cloudflare_logpush.email_security_alerts.links
      ignore_empty_value: true
  - foreach:
      field: _tmp.links
      if: ctx._tmp?.links instanceof List
      processor:
        uri_parts:
              field: _ingest._value
          target_field: _ingest._value
          ignore_missing: true
          on_failure:
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: _tmp.links
      if: ctx._tmp?.links instanceof List
      processor:
        append:
          field: related.hosts
          value: '{{{_ingest._value.domain}}}'
          allow_duplicates: false
  - script:
      lang: painless
      if: ctx.related?.user instanceof List || (ctx.server?.domain != null)
      source: |-
        def domains = new HashSet();
        if (ctx.related?.hosts instanceof List) {
          for (def h: ctx.related.hosts) {
            domains.add(h);
          }
        }
        if (ctx.server?.domain != null) {
          domains.add(ctx.server.domain)
        }
        if (ctx.related?.user instanceof List) {
          for (def u: ctx.related.user) {
            if (u.length() < 3) {
              continue;
            }
            def parts = u.splitOnToken('@');
            if (parts.length != 2) {
              continue;
            }
            domains.add(parts[1]);
          }
        }
        ctx.related.hosts = domains;
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: server.ip
      copy_from: cloudflare_logpush.email_security_alerts.smtp_helo_server_ip
      ignore_empty_value: true
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.email_security_alerts.smtp_helo_server_ip}}}'
      if: ctx.cloudflare_logpush?.email_security_alerts?.smtp_helo_server_ip != null
      allow_duplicates: false
  - geoip:
      field: server.ip
      target_field: server.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: server.ip
      target_field: server.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      field: server.as.asn
      target_field: server.as.number
      ignore_missing: true
  - rename:
      field: server.as.organization_name
      target_field: server.as.organization.name
      ignore_missing: true
  - script:
      lang: painless
      if: ctx.cloudflare_logpush?.email_security_alerts?.attachments instanceof List
      source: |-
        def files = [];
        def emailAttachments = [];
        def hashes = new HashSet();
        for (def a: ctx.cloudflare_logpush.email_security_alerts.attachments) {
          def f = [:];
          def efa = [:];
          if (a.Name != null) {
            f.name = a.Name;
          }
          if (a.ContentTypeComputed != null) {
            f.mime_type = a.ContentTypeComputed;
          }
          def fh = [:];
          if (a.Md5 != null) {
            fh.md5 = a.Md5;
          }
          if (a.Sha1 != null) {
            fh.sha1 = a.Sha1;
          }
          if (a.Sha256 != null) {
            fh.sha256 = a.Sha256;
          }
          if (a.Sha384 != null) {
            fh.sha384 = a.Sha384;
          }
          if (a.Sha512 != null) {
            fh.sha512 = a.Sha512;
          }
          if (a.Ssdeep != null) {
            fh.ssdeep = a.Ssdeep;
          }
          if (fh.size() != 0) {
            f.hash = fh;
          }
          files.add(f);
          efa.put('file', f);
          emailAttachments.add(efa);
          for (def h: fh.entrySet()) {
            hashes.add(h.getValue());
          }
        }
        ctx.file = files;
        if (emailAttachments.size() != 0) {
          if (ctx.email == null) {
            ctx.email = [:];
          }
          ctx.email.attachments = emailAttachments;
        }
        ctx.related = ctx.related ?: [:];
        ctx.related.hash = hashes;
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - remove:
      field:
        - json
        - _tmp
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.email_security_alerts.timestamp
        - cloudflare_logpush.email_security_alerts.smtp_helo_server_ip
        - cloudflare_logpush.email_security_alerts.from
        - cloudflare_logpush.email_security_alerts.to
        - cloudflare_logpush.email_security_alerts.cc
        - cloudflare_logpush.email_security_alerts.subject
        - cloudflare_logpush.email_security_alerts.message_id
        - cloudflare_logpush.email_security_alerts.reply_to
        - cloudflare_logpush.email_security_alerts.smtp_envelope_from
      if: ctx.tags == null || !ctx.tags.contains('preserve_duplicate_custom_fields')
      ignore_failure: true
      ignore_missing: true
  - script:
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
