---
description: Pipeline for processing sample logs
processors:

- set:
    field: ecs.version
    value: '8.17.0'

- rename:
    field: json
    target_field: jamf_pro.events
    # all valid events will now have jamf_pro.events.{event,webhook}

- convert:
    field: jamf_pro.events.event.management_id
    type: string
    if: >
      ctx.jamf_pro.events.event?.management_id != null &&
      !(ctx.jamf_pro.events.event.management_id instanceof String)

- rename:
    field: jamf_pro.events.event.computer
    target_field: jamf_pro.events.event.is_computer
    if: ctx.jamf_pro.events.event.computer instanceof boolean

- script:
    description: Convert Additional Info keys to snake case.
    tag: additional-info-keys-to-snake-case
    lang: painless
    source: |
      Map keysToSnakeCase(Map m) {
        def regex = /_?([a-z])([A-Z]+)/;
        def snakeCaseMap = [:];

        for (entry in m.entrySet()) {
          def k = entry.getKey();
          def v = entry.getValue();

          if (v instanceof Map) {
            v = keysToSnakeCase(v);
          } else if (v instanceof List) {
            for (int i = 0; i < v.size(); i++) {
              def item = v.get(i);
              if (item instanceof Map) {
                v.set(i, keysToSnakeCase(item));
              }
            }
          }

          k = regex.matcher(k).replaceAll('$1_$2').toLowerCase();
          snakeCaseMap.put(k, v);
        }
        return snakeCaseMap;
      }

      if(ctx.jamf_pro.events != null) {
        ctx.jamf_pro.events = keysToSnakeCase(ctx.jamf_pro.events);
      }

##############
# Timestamps #
##############

- date:
    field: jamf_pro.events.webhook.event_timestamp
    target_field: jamf_pro.events.webhook.event_timestamp
    formats:
      - UNIX_MS

- date:
    field: jamf_pro.events.event.last_update
    target_field: jamf_pro.events.event.last_update
    if: ctx.jamf_pro.events.event.last_update != null
    formats:
      - UNIX_MS

- set:
    field: host.entity.lifecycle.last_activity
    copy_from: jamf_pro.events.webhook.event_timestamp
    ignore_empty_value: true

##############
#   IP src   #
##############

- set:
    if: "ctx.jamf_pro.events.event.ip_address != null && ctx.jamf_pro.events.event.ip_address != ''"
    field: host.ip
    value: 
     - '{{{jamf_pro.events.event.ip_address}}}'
    ignore_empty_value: true

- set:
    if: >
      ctx.jamf_pro.events.event.computer?.reported_ip_address != null &&
      ctx.jamf_pro.events.event.computer.reported_ip_address != ''
    field: host.ip
    value: 
     - "{{{jamf_pro.events.event.computer.reported_ip_address}}}"
    ignore_empty_value: true

##############
#  User src  #
##############

- set:
    field: user.name
    copy_from: jamf_pro.events.event.username
    ignore_empty_value: true

- set:
    field: user.name
    copy_from: jamf_pro.events.event.computer.username
    ignore_empty_value: true

- set:
    field: user.email
    copy_from: jamf_pro.events.event.computer.email_address
    ignore_empty_value: true

- set:
    field: user.email
    copy_from: jamf_pro.events.event.email_address
    ignore_empty_value: true

##############
#   OS src   #
##############

- set:
    if: ctx.jamf_pro.events.event.os_version != null
    field: host.os.version
    copy_from: jamf_pro.events.event.os_version

- set:
    if: ctx.jamf_pro.events.event.computer?.os_version != null
    field: host.os.version
    copy_from: jamf_pro.events.event.computer.os_version


##############
# ECS compat #
##############

- set:
    field: host.name
    copy_from: jamf_pro.events.event.computer.device_name
    ignore_empty_value: true

- set:
    field: host.id
    copy_from: jamf_pro.events.event.computer.udid
    ignore_empty_value: true

- set:
    field: host.address
    copy_from: host.ip
    ignore_empty_value: true

- geoip:
    if: ctx.host?.ip != null && ctx.host.ip != ''
    field: host.ip
    target_field: host.geo
    ignore_missing: true

- append:
    field: related.user
    value: "{{{user.name}}}"
    if: ctx.user?.name != null && ctx.user.name != ""

- append:
    field: related.user
    value: "{{{user.email}}}"
    if: ctx.user?.email != null && ctx.user.email != ""

- set:
    field: event.kind
    value: event

- set:
    field: event.action
    copy_from: jamf_pro.events.webhook.webhook_event
    ignore_empty_value: true

# event.category — keyed on event.action
- append:
    field: event.category
    tag: append_host_into_event_category
    value: host
    if: >-
      ctx.event?.action != null &&
      ['ComputerAdded', 'ComputerCheckIn', 'ComputerInventoryCompleted',
       'ComputerPushCapabilityChanged', 'MobileDeviceEnrolled',
       'MobileDeviceUnEnrolled', 'MobileDeviceCheckIn',
       'MobileDeviceInventoryCompleted', 'MobileDeviceCommandCompleted',
       'MobileDevicePushSent', 'DeviceAddedToDEP', 'PushSent', 'SCEPChallenge',
       'SmartGroupComputerMembershipChange',
       'SmartGroupMobileDeviceMembershipChange', 'JSSStartup',
       'JSSShutdown'].contains(ctx.event.action)
- append:
    field: event.category
    tag: append_configuration_into_event_category
    value: configuration
    if: >-
      ctx.event?.action != null &&
      ['ComputerPolicyFinished', 'ComputerPatchPolicyCompleted',
       'PatchSoftwareTitleUpdated'].contains(ctx.event.action)
- append:
    field: event.category
    tag: append_package_into_event_category
    value: package
    if: >-
      ctx.event?.action != null &&
      ['ComputerPatchPolicyCompleted', 'PatchSoftwareTitleUpdated'].contains(ctx.event.action)
- append:
    field: event.category
    tag: append_api_into_event_category
    value: api
    if: ctx.event?.action == 'RestAPIOperation'
- append:
    field: event.category
    tag: append_iam_into_event_category
    value: iam
    if: >-
      ctx.event?.action != null &&
      ['SmartGroupComputerMembershipChange',
       'SmartGroupMobileDeviceMembershipChange',
       'SmartGroupUserMembershipChange'].contains(ctx.event.action)
- append:
    field: event.category
    tag: append_authentication_into_event_category
    value: authentication
    if: ctx.event?.action == 'SCEPChallenge'

# event.type — keyed on event.action
- append:
    field: event.type
    tag: append_change_into_event_type
    value: change
    if: >-
      ctx.event?.action != null &&
      ['ComputerAdded', 'ComputerPushCapabilityChanged',
       'ComputerPolicyFinished', 'ComputerPatchPolicyCompleted',
       'MobileDeviceEnrolled', 'MobileDeviceUnEnrolled',
       'MobileDeviceCommandCompleted', 'DeviceAddedToDEP',
       'PatchSoftwareTitleUpdated', 'RestAPIOperation',
       'SmartGroupComputerMembershipChange',
       'SmartGroupMobileDeviceMembershipChange',
       'SmartGroupUserMembershipChange'].contains(ctx.event.action)
- append:
    field: event.type
    tag: append_end_into_event_type
    value: end
    if: >-
      ctx.event?.action != null &&
      ['MobileDeviceUnEnrolled', 'MobileDeviceCommandCompleted',
       'JSSShutdown'].contains(ctx.event.action)
- append:
    field: event.type
    tag: append_start_into_event_type
    value: start
    if: >-
      ctx.event?.action != null &&
      ['SCEPChallenge', 'JSSStartup'].contains(ctx.event.action)
- append:
    field: event.type
    tag: append_admin_into_event_type
    value: admin
    if: ctx.event?.action == 'RestAPIOperation'
- append:
    field: event.type
    tag: append_group_into_event_type
    value: group
    if: >-
      ctx.event?.action != null &&
      ['SmartGroupComputerMembershipChange',
       'SmartGroupMobileDeviceMembershipChange',
       'SmartGroupUserMembershipChange'].contains(ctx.event.action)
- append:
    field: event.type
    tag: append_info_default_into_event_type
    value: info

- set:
    field: event.outcome
    tag: set_event_outcome_success
    value: success
    if: >-
      ctx.jamf_pro?.events?.event?.successful == true ||
      ctx.jamf_pro?.events?.event?.operation_successful == true

- set:
    field: event.outcome
    tag: set_event_outcome_failure
    value: failure
    if: >-
      ctx.jamf_pro?.events?.event?.successful == false ||
      ctx.jamf_pro?.events?.event?.operation_successful == false

- convert:
    target_field: source.ip
    type: ip
    field: jamf_pro.events.event.computer.ip_address
    if: ctx.jamf_pro?.events?.event?.computer?.ip_address != null && ctx.jamf_pro.events.event.computer.ip_address != ''
    ignore_missing: true
    ignore_failure: true

##################
# Error handling #
##################

on_failure:
- set:
    field: event.kind
    value: pipeline_error
- append:
    field: tags
    value: preserve_original_event
    allow_duplicates: false
- append:
    field: error.message
    value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
