---
description: Pipeline for parsing Cloudflare Workers Trace Event logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.category
      value: [web]
  - set:
      field: event.type
      value: [info]
  - set:
      field: event.kind
      value: event
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  # Timestamp
  - date:
      field: json.EventTimestampMs
      if: ctx.json?.EventTimestampMs != null && ctx.json.EventTimestampMs != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.workers_trace.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true

  # ECS fields
  - rename:
      field: json.EventType
      target_field: cloudflare_logpush.workers_trace.type
      ignore_missing: true
  - set:
      field: event.action
      copy_from: cloudflare_logpush.workers_trace.type
      ignore_empty_value: true

  # Set event.outcome
  - rename:
      field: json.Outcome
      target_field: cloudflare_logpush.workers_trace.outcome
      ignore_missing: true
  - set:
      field: event.outcome
      value: success
      if: ctx.cloudflare_logpush?.workers_trace?.outcome == 'ok'
  - set:
      field: event.outcome
      value: failure
      if: ctx.cloudflare_logpush?.workers_trace?.outcome == 'exception'
  - append:
      field: event.type
      value: error
      allow_duplicates: false
      if: ctx.event?.outcome == 'failure'

  # Custom fields
  - rename:
      field: json.DispatchNamespace
      target_field: cloudflare_logpush.workers_trace.dispatch_namespace
      ignore_missing: true
  - rename:
      field: json.Entrypoint
      target_field: cloudflare_logpush.workers_trace.entrypoint
      ignore_missing: true
  - rename:
      field: json.Event
      target_field: cloudflare_logpush.workers_trace.event
      ignore_missing: true
  - rename:
      field: json.Exceptions
      target_field: cloudflare_logpush.workers_trace.exceptions
      ignore_missing: true
  - rename:
      field: json.Logs
      target_field: cloudflare_logpush.workers_trace.logs
      ignore_missing: true
  - rename:
      field: json.ScriptName
      target_field: cloudflare_logpush.workers_trace.script.name
      ignore_missing: true
  - rename:
      field: json.ScriptTags
      target_field: cloudflare_logpush.workers_trace.script.tags
      ignore_missing: true
  - rename:
      field: json.ScriptVersion
      target_field: cloudflare_logpush.workers_trace.script.version
      ignore_missing: true
  - convert:
      field: json.CPUTimeMs
      target_field: cloudflare_logpush.workers_trace.cpu_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.WallTimeMs
      target_field: cloudflare_logpush.workers_trace.wall_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - script:
      description: Convert Workers Trace Events keys to snake case recursively.
      if: ctx.cloudflare_logpush?.workers_trace != null
      lang: painless
      source: |-
        Map keysToSnakeCase(Map m) {
          def regex = /([a-z])([A-Z]+)/;
          def out = [:];

          for (entry in m.entrySet()) {
            def k = entry.getKey();
            def v = entry.getValue();

            if (v instanceof Map) {
              v = keysToSnakeCase(v);
            } else if (v instanceof List) {
              for (int i = 0; i < v.size(); i++) {
                def item = v.get(i);
                if (item instanceof Map) {
                  v.set(i, keysToSnakeCase(item));
                }
              }
            }

            k = regex.matcher(k).replaceAll('$1_$2').toLowerCase();
            out.put(k, v);
          }

          return out;
        }

        ctx.cloudflare_logpush['workers_trace'] = keysToSnakeCase(ctx.cloudflare_logpush.workers_trace);
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  - set:
      field: event.id
      copy_from: cloudflare_logpush.workers_trace.event.ray_id
      ignore_empty_value: true
  - set:
      field: http.request.method
      copy_from: cloudflare_logpush.workers_trace.event.request.method
      ignore_empty_value: true
  - set:
      field: http.response.status_code
      copy_from: cloudflare_logpush.workers_trace.event.response.status
      ignore_empty_value: true
  - uri_parts:
      field: cloudflare_logpush.workers_trace.event.request.url
      target_field: url
      if: ctx.cloudflare_logpush?.workers_trace?.event?.request?.url != null

  # Clean event
  - remove:
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.workers_trace.event.ray_id
        - cloudflare_logpush.workers_trace.event.request.method
        - cloudflare_logpush.workers_trace.event.request.url
        - cloudflare_logpush.workers_trace.event.response.status
        - cloudflare_logpush.workers_trace.outcome
        - cloudflare_logpush.workers_trace.timestamp
        - cloudflare_logpush.workers_trace.type
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
  - script:
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
