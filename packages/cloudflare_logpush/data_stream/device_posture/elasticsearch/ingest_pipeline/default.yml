---
description: Pipeline for parsing Cloudflare Device Posture Results logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.category
      value: [host]
  - set:
      field: event.type
      value: [info]
  - set:
      field: event.kind
      value: event
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.device_posture.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true
  - rename:
      field: json.ClientVersion
      target_field: cloudflare_logpush.device_posture.version
      ignore_missing: true
  - set:
      field: user_agent.version
      copy_from: cloudflare_logpush.device_posture.version
      ignore_empty_value: true
  - rename:
      field: json.DeviceID
      target_field: cloudflare_logpush.device_posture.host.id
      ignore_missing: true
  - set:
      field: host.id
      copy_from: cloudflare_logpush.device_posture.host.id
      ignore_empty_value: true
  - set:
      field: device.id
      copy_from: cloudflare_logpush.device_posture.host.id
      ignore_empty_value: true
  - rename:
      field: json.DeviceManufacturer
      target_field: cloudflare_logpush.device_posture.host.manufacturer
      ignore_missing: true
  - set:
      field: device.manufacturer
      copy_from: cloudflare_logpush.device_posture.host.manufacturer
      ignore_empty_value: true
  - rename:
      field: json.DeviceModel
      target_field: cloudflare_logpush.device_posture.host.model
      ignore_missing: true
  - set:
      field: device.model.name
      copy_from: cloudflare_logpush.device_posture.host.model
      ignore_empty_value: true
  - rename:
      field: json.DeviceName
      target_field: cloudflare_logpush.device_posture.host.name
      ignore_missing: true
  - set:
      field: host.name
      copy_from: cloudflare_logpush.device_posture.host.name
      ignore_empty_value: true
  - rename:
      field: json.DeviceSerialNumber
      target_field: cloudflare_logpush.device_posture.host.serial
      ignore_missing: true
  - set:
      field: device.serial_number
      copy_from: cloudflare_logpush.device_posture.host.serial
      ignore_empty_value: true
  - rename:
      field: json.DeviceType
      target_field: cloudflare_logpush.device_posture.host.os.family
      ignore_missing: true
  - set:
      field: host.os.family
      copy_from: cloudflare_logpush.device_posture.host.os.family
      ignore_empty_value: true
  - set:
      field: device.type
      copy_from: cloudflare_logpush.device_posture.host.os.family
      ignore_empty_value: true
  - rename:
      field: json.OSVersion
      target_field: cloudflare_logpush.device_posture.host.os.version
      ignore_missing: true
  - set:
      field: host.os.version
      copy_from: cloudflare_logpush.device_posture.host.os.version
      ignore_empty_value: true
  - rename:
      field: json.PolicyID
      target_field: cloudflare_logpush.device_posture.rule.id
      ignore_missing: true
  - set:
      field: rule.id
      copy_from: cloudflare_logpush.device_posture.rule.id
      ignore_empty_value: true
  - rename:
      field: json.PostureCheckName
      target_field: cloudflare_logpush.device_posture.rule.name
      ignore_missing: true
  - set:
      field: rule.name
      copy_from: cloudflare_logpush.device_posture.rule.name
      ignore_empty_value: true
  - rename:
      field: json.PostureCheckType
      target_field: cloudflare_logpush.device_posture.rule.category
      ignore_missing: true
  - set:
      field: rule.category
      copy_from: cloudflare_logpush.device_posture.rule.category
      ignore_empty_value: true
  - convert:
      field: json.PostureEvaluatedResult
      target_field: cloudflare_logpush.device_posture.eval.result
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  # Set event.outcome from cloudflare_logpush.device_posture.eval.result
  - set:
      field: event.outcome
      value: success
      if: ctx.cloudflare_logpush?.device_posture?.eval?.result != null && ctx.cloudflare_logpush?.device_posture?.eval?.result == true
  - set:
      field: event.outcome
      value: failure
      if: ctx.cloudflare_logpush?.device_posture?.eval?.result != null && ctx.cloudflare_logpush?.device_posture?.eval?.result == false
  - rename:
      field: json.PostureExpectedJSON
      target_field: cloudflare_logpush.device_posture.eval.expected
      ignore_missing: true
  - rename:
      field: json.PostureReceivedJSON
      target_field: cloudflare_logpush.device_posture.eval.received
      ignore_missing: true
  - rename:
      field: json.UserUID
      target_field: cloudflare_logpush.device_posture.user.id
      ignore_missing: true
  - set:
      field: user.id
      copy_from: cloudflare_logpush.device_posture.user.id
      if: ctx.cloudflare_logpush?.device_posture?.user?.id != null && ctx.cloudflare_logpush?.device_posture?.user?.id != ""
  - rename:
      field: json.Email
      target_field: cloudflare_logpush.device_posture.user.email
      ignore_missing: true
  - set:
      field: user.email
      copy_from: cloudflare_logpush.device_posture.user.email
      if: ctx.cloudflare_logpush?.device_posture?.user?.email != null && ctx.cloudflare_logpush?.device_posture?.user?.email != ""
  - rename:
      field: json.RegistrationID
      target_field: cloudflare_logpush.device_posture.registration_id
      ignore_missing: true
  # Create related fields
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.device_posture.host.id}}}'
      if: ctx.cloudflare_logpush?.device_posture?.host?.id != null
      allow_duplicates: false
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.device_posture.host.name}}}'
      if: ctx.cloudflare_logpush?.device_posture?.host?.name != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.device_posture.user.id}}}'
      if: ctx.cloudflare_logpush?.device_posture?.user?.id != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.device_posture.user.email}}}'
      if: ctx.cloudflare_logpush?.device_posture?.user?.email != null
      allow_duplicates: false
  - remove:
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.device_posture.timestamp
        - cloudflare_logpush.device_posture.version
        - cloudflare_logpush.device_posture.host.id
        - cloudflare_logpush.device_posture.host.name
        - cloudflare_logpush.device_posture.host.manufacturer
        - cloudflare_logpush.device_posture.host.model
        - cloudflare_logpush.device_posture.host.serial
        - cloudflare_logpush.device_posture.host.os.family
        - cloudflare_logpush.device_posture.host.os.version
        - cloudflare_logpush.device_posture.rule.id
        - cloudflare_logpush.device_posture.rule.name
        - cloudflare_logpush.device_posture.rule.category
        - cloudflare_logpush.device_posture.user.id
        - cloudflare_logpush.device_posture.user.email
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
  - script:
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
