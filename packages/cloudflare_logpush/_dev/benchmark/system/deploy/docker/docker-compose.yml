version: "2.3"
services:
  cloudflare-logpush-network_analytics:
    image: docker.elastic.co/observability/stream:v0.20.0
    volumes:
      - ${SERVICE_LOGS_DIR}:/var/log
    environment:
      - STREAM_PROTOCOL=webhook
      - STREAM_WEBHOOK_PROBE=false
      - STREAM_ADDR=http://elastic-agent:9560/cloudflare_logpush/network_analytics
    command: log --start-signal=SIGHUP --delay=5s /var/log/corpus-*
  cloudflare-logpush-network_session:
    image: docker.elastic.co/observability/stream:v0.20.0
    volumes:
      - ${SERVICE_LOGS_DIR}:/var/log
    environment:
