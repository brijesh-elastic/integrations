---
description: Pipeline for parsing Cloudflare Network Analytics logs.
processors:
  - set:
      tag: set_ecs_version_b777da29
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      tag: json_event_original_to_json_5e54dc16
      field: event.original
      target_field: json
  - set:
      tag: set_event_category_dbab8a4e
      field: event.category
      value: [network]
  - set:
      tag: set_event_kind_de80643c
      field: event.kind
      value: event
  - set:
      tag: set_event_type_ec95f7f2
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      tag: convert_json_Datetime_712ea5a9
      field: json.Datetime
      type: long
      if: ctx.json?.Datetime != null && ctx.json.Datetime != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_datetime_to_milli
      if: ctx.json?.Datetime != null && ctx.json.Datetime instanceof Number
      source: |
        long t = (long)(ctx.json.Datetime);
        if (t > (long)(1e18)) {
          ctx.json.Datetime = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Datetime = t*(long)(1e3)
        }
      on_failure:
        - append:
            tag: append_error_message_6318b156
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Datetime
      tag: date_json_datetime
      if: ctx.json?.Datetime != null && ctx.json.Datetime != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - remove:
            tag: remove_json_Datetime_fff9e67e
            field: json.Datetime
            ignore_missing: true
        - append:
            tag: append_error_message_a5ae079a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_cloudflare_logpush_network_analytics_timestamp_5d354fd6
      field: cloudflare_logpush.network_analytics.timestamp
      copy_from: '@timestamp'
      ignore_empty_value: true
  - set:
      tag: set_cloudflare_logpush_network_analytics_outcome_4476b418
