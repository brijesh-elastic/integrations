---
description: Pipeline for parsing Cloudflare Zero Trust Network Session logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.category
      value: [network, session]
  - set:
      field: event.type
      value: [connection]
  - set:
      field: event.kind
      value: event
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  # ECS fields
  - convert:
      field: json.SessionStartTime
      type: long
      if: ctx.json?.SessionStartTime != null && ctx.json.SessionStartTime != ''
      ignore_failure: true
  - convert:
      field: json.SessionEndTime
      type: long
      if: ctx.json?.SessionEndTime != null && ctx.json.SessionEndTime != ''
      ignore_failure: true
  - script:
      lang: painless
      source: |
        def convertToMillis(long timestamp) {
          if (timestamp > (long)(1e18)) {
            return timestamp/(long)(1e6)
          } else if (timestamp < (long)(1e10))  {
            return timestamp*(long)(1e3)
          }
          return timestamp
        }
        if (ctx.json?.SessionStartTime != null && ctx.json.SessionStartTime instanceof Number) {
          ctx.json.SessionStartTime = convertToMillis(ctx.json.SessionStartTime);
        }
        if (ctx.json?.SessionEndTime != null && ctx.json.SessionEndTime instanceof Number) {
          ctx.json.SessionEndTime = convertToMillis(ctx.json.SessionEndTime);
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.SessionStartTime
      if: ctx.json?.SessionStartTime != null && ctx.json.SessionStartTime != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.network_session.session.start
      copy_from: "@timestamp"
      ignore_empty_value: true
  - set:
      field: event.start
      copy_from: cloudflare_logpush.network_session.session.start
      ignore_empty_value: true
  - set:
      field: cloudflare_logpush.network_session.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true
  - date:
      field: json.SessionEndTime
      target_field: cloudflare_logpush.network_session.session.end
      if: ctx.json?.SessionEndTime != null && ctx.json.SessionEndTime != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.end
      copy_from: cloudflare_logpush.network_session.session.end
      ignore_empty_value: true
  - script:
      lang: painless
      description: Calculates event.duration from event.start and event.end
      if: ctx.event?.start != null && ctx.event?.end != null && ctx.event?.duration == null
      source: >-
        ZonedDateTime start = ZonedDateTime.parse(ctx.event.start);
        ZonedDateTime end = ZonedDateTime.parse(ctx.event.end);
        ctx.event.duration = ChronoUnit.NANOS.between(start, end);
  - convert:
      field: json.BytesReceived
      target_field: cloudflare_logpush.network_session.destination.bytes
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.bytes
      copy_from: cloudflare_logpush.network_session.destination.bytes
      ignore_empty_value: true
  - convert:
      field: json.BytesSent
      target_field: cloudflare_logpush.network_session.source.bytes
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.bytes
      copy_from: cloudflare_logpush.network_session.source.bytes
      ignore_empty_value: true
  - rename:
      field: json.DetectedProtocol
      target_field: cloudflare_logpush.network_session.detected_protocol
      ignore_missing: true
  - rename:
      field: json.DeviceID
      target_field: cloudflare_logpush.network_session.host.id
      ignore_missing: true
  - set:
      field: host.id
      copy_from: cloudflare_logpush.network_session.host.id
      ignore_empty_value: true
  - set:
      field: device.id
      copy_from: cloudflare_logpush.network_session.host.id
      ignore_empty_value: true
  - rename:
      field: json.DeviceName
      target_field: cloudflare_logpush.network_session.host.name
      ignore_missing: true
  - set:
      field: host.name
      copy_from: cloudflare_logpush.network_session.host.name
      ignore_empty_value: true
  - convert:
      field: json.OriginIP
      target_field: cloudflare_logpush.network_session.destination.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.OriginIP != ''
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.ip
      copy_from: cloudflare_logpush.network_session.destination.ip
      ignore_empty_value: true
  # Geo enrichment (destination IP)
  - geoip:
      field: destination.ip
      target_field: destination.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: destination.ip
      target_field: destination.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      field: destination.as.asn
      target_field: destination.as.number
      ignore_missing: true
  - rename:
      field: destination.as.organization_name
      target_field: destination.as.organization.name
      ignore_missing: true
  - convert:
      field: json.OriginPort
      target_field: cloudflare_logpush.network_session.destination.port
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.port
      copy_from: cloudflare_logpush.network_session.destination.port
      ignore_empty_value: true
  - rename:
      field: json.OriginTLSCertificateIssuer
      target_field: cloudflare_logpush.network_session.tls.server.certificate.issuer
      ignore_missing: true
  - set:
      field: tls.server.issuer
      copy_from: cloudflare_logpush.network_session.tls.server.certificate.issuer
      ignore_empty_value: true
  - rename:
      field: json.Protocol
      target_field: cloudflare_logpush.network_session.transport
      ignore_missing: true
  - set:
      field: network.transport
      copy_from: cloudflare_logpush.network_session.transport
      ignore_empty_value: true
  - rename:
      field: json.SessionID
      target_field: cloudflare_logpush.network_session.session.id
      ignore_missing: true
  - set:
      field: event.id
      copy_from: cloudflare_logpush.network_session.session.id
      ignore_empty_value: true
  - convert:
      field: json.SourceIP
      target_field: cloudflare_logpush.network_session.source.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.SourceIP != ''
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      copy_from: cloudflare_logpush.network_session.source.ip
      ignore_empty_value: true
  # Geo enrichment (source IP)
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - convert:
      field: json.SourcePort
      target_field: cloudflare_logpush.network_session.source.port
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.port
      copy_from: cloudflare_logpush.network_session.source.port
      ignore_empty_value: true
  - rename:
      field: json.UserID
      target_field: cloudflare_logpush.network_session.user.id
      ignore_missing: true
  - set:
      field: user.id
      copy_from: cloudflare_logpush.network_session.user.id
      ignore_empty_value: true
  - rename:
      field: json.Email
      target_field: cloudflare_logpush.network_session.user.email
      ignore_missing: true
  - set:
      field: user.email
      copy_from: cloudflare_logpush.network_session.user.email
      ignore_empty_value: true
  - rename:
      field: json.VirtualNetworkID
      target_field: cloudflare_logpush.network_session.vlan.id
      ignore_missing: true
  - set:
      field: network.vlan.id
      copy_from: cloudflare_logpush.network_session.vlan.id
      ignore_empty_value: true
  # Custom fields
  - rename:
      field: json.AccountID
      target_field: cloudflare_logpush.network_session.account_id
      ignore_missing: true
  - convert:
      field: json.ClientTCPHandshakeDurationMs
      target_field: cloudflare_logpush.network_session.tcp.client.handshake_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.ConnectionCloseReason
      target_field: cloudflare_logpush.network_session.tcp.connection.close_reason
      ignore_missing: true
  - convert:
      field: json.ConnectionReuse
      target_field: cloudflare_logpush.network_session.tcp.connection.reuse
      type: boolean
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.DestinationTunnelID
      target_field: cloudflare_logpush.network_session.destination.tunnel_id
      ignore_missing: true
  - rename:
      field: json.EgressColoName
      target_field: cloudflare_logpush.network_session.egress.colo_name
      ignore_missing: true
  - convert:
      field: json.EgressIP
      target_field: cloudflare_logpush.network_session.egress.ip
      type: ip
      ignore_missing: true
      if: ctx.json?.EgressIP != ''
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.EgressPort
      target_field: cloudflare_logpush.network_session.egress.port
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.EgressRuleID
      target_field: cloudflare_logpush.network_session.egress.rule.id
      ignore_missing: true
  - rename:
      field: json.EgressRuleName
      target_field: cloudflare_logpush.network_session.egress.rule.name
      ignore_missing: true
  - rename:
      field: json.IngressColoName
      target_field: cloudflare_logpush.network_session.ingress.colo_name
      ignore_missing: true
  - rename:
      field: json.Offramp
      target_field: cloudflare_logpush.network_session.offramp
      ignore_missing: true
  - convert:
      field: json.RuleEvaluationDurationMs
      target_field: cloudflare_logpush.network_session.rule_evaluation.time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.SourceInternalIP
      target_field: cloudflare_logpush.network_session.source.internal_ip
      type: ip
      ignore_missing: true
      if: ctx.json?.SourceInternalIP != ''
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - convert:
      field: json.InitialOriginIP
      target_field: cloudflare_logpush.network_session.initial_origin_ip
      type: ip
      ignore_missing: true
      if: ctx.json?.InitialOriginIP != ''
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.RegistrationID
      target_field: cloudflare_logpush.network_session.registration_id
      ignore_missing: true
  - rename:
      field: json.ResolvedFQDN
      target_field: cloudflare_logpush.network_session.resolved_fqdn
      ignore_missing: true
  - rename:
      field: json.SNI
      target_field: cloudflare_logpush.network_session.sni
      ignore_missing: true
  - set:
      field: tls.client.server_name
      copy_from: cloudflare_logpush.network_session.sni
      ignore_empty_value: true
  - rename:
      field: json.ClientTLSCipher
      target_field: cloudflare_logpush.network_session.tls.client.cipher
      ignore_missing: true
  - set:
      field: tls.cipher
      copy_from: cloudflare_logpush.network_session.tls.client.cipher
      ignore_empty_value: true
  - convert:
      field: json.ClientTLSHandshakeDurationMs
      target_field: cloudflare_logpush.network_session.tls.client.handshake_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.ClientTLSVersion
      target_field: cloudflare_logpush.network_session.tls.client.version
      ignore_missing: true
  - dissect:
      field: cloudflare_logpush.network_session.tls.client.version
      pattern: '%{tls.version_protocol}v%{tls.version}'
      ignore_missing: true
      ignore_failure: true
  - lowercase:
      field: tls.version_protocol
      ignore_missing: true
  - rename:
      field: json.OriginTLSCertificateValidationResult
      target_field: cloudflare_logpush.network_session.tls.server.certificate.validation_result
      ignore_missing: true
  - rename:
      field: json.OriginTLSCipher
      target_field: cloudflare_logpush.network_session.tls.server.cipher
      ignore_missing: true
  - convert:
      field: json.OriginTLSHandshakeDurationMs
      target_field: cloudflare_logpush.network_session.tls.server.handshake_time_ms
      type: long
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.OriginTLSVersion
      target_field: cloudflare_logpush.network_session.tls.server.version
      ignore_missing: true
  # Create related fields
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.network_session.source.ip}}}'
      if: ctx.cloudflare_logpush?.network_session?.source?.ip != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.network_session.destination.ip}}}'
      if: ctx.cloudflare_logpush?.network_session?.destination?.ip != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.network_session.egress.ip}}}'
      if: ctx.cloudflare_logpush?.network_session?.egress?.ip != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.network_session.source.internal_ip}}}'
      if: ctx.cloudflare_logpush?.network_session?.source?.internal_ip != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.network_session.initial_origin_ip}}}'
      if: ctx.cloudflare_logpush?.network_session?.initial_origin_ip != null
      allow_duplicates: false
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.network_session.host.id}}}'
      if: ctx.cloudflare_logpush?.network_session?.host?.id != null
      allow_duplicates: false
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.network_session.host.name}}}'
      if: ctx.cloudflare_logpush?.network_session?.host?.name != null
      allow_duplicates: false
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.network_session.resolved_fqdn}}}'
      if: ctx.cloudflare_logpush?.network_session?.resolved_fqdn != null
      allow_duplicates: false
  - append:
      field: related.hosts
      value: '{{{cloudflare_logpush.network_session.sni}}}'
      if: ctx.cloudflare_logpush?.network_session?.sni != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.network_session.user.id}}}'
      if: ctx.cloudflare_logpush?.network_session?.user?.id != null
      allow_duplicates: false
  - append:
      field: related.user
      value: '{{{cloudflare_logpush.network_session.user.email}}}'
      if: ctx.cloudflare_logpush?.network_session?.user?.email != null
      allow_duplicates: false
  - remove:
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.network_session.timestamp
        - cloudflare_logpush.network_session.destination.bytes
        - cloudflare_logpush.network_session.source.bytes
        - cloudflare_logpush.network_session.destination.ip
        - cloudflare_logpush.network_session.destination.port
        - cloudflare_logpush.network_session.host.id
        - cloudflare_logpush.network_session.host.name
        - cloudflare_logpush.network_session.tls.server.certificate.issuer
        - cloudflare_logpush.network_session.transport
        - cloudflare_logpush.network_session.session.id
        - cloudflare_logpush.network_session.session.start
        - cloudflare_logpush.network_session.session.end
        - cloudflare_logpush.network_session.source.ip
        - cloudflare_logpush.network_session.source.port
        - cloudflare_logpush.network_session.user.id
        - cloudflare_logpush.network_session.user.email
        - cloudflare_logpush.network_session.vlan.id
        - cloudflare_logpush.network_session.tls.client.cipher
        - cloudflare_logpush.network_session.sni
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
  - script:
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
