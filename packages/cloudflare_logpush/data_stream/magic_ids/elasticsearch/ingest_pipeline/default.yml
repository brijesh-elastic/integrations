---
description: Pipeline for parsing Cloudflare Magic IDS logs.
processors:
  - set:
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      target_field: json
  - set:
      field: event.kind
      value: event
  - set:
      field: event.category
      value:
        - network
        - intrusion_detection
  - set:
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  # Timestamp
  - convert:
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      on_failure:
        - remove:
                  field: json.Timestamp
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: cloudflare_logpush.magic_ids.timestamp
      copy_from: "@timestamp"
      ignore_empty_value: true

  # Handle destination IP and port
  - convert:
      field: json.DestinationIP
      target_field: cloudflare_logpush.magic_ids.destination.ip
      type: ip
      if: ctx.json?.DestinationIP != ''
      ignore_missing: true
      on_failure:
        - remove:
                  field: json.DestinationIP
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.ip
      copy_from: cloudflare_logpush.magic_ids.destination.ip
      ignore_empty_value: true
  # Geo enrichment (destination IP)
  - geoip:
      field: destination.ip
      target_field: destination.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: destination.ip
      target_field: destination.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      field: destination.as.asn
      target_field: destination.as.number
      ignore_missing: true
  - rename:
      field: destination.as.organization_name
      target_field: destination.as.organization.name
      ignore_missing: true
  - convert:
      field: json.DestinationPort
      target_field: cloudflare_logpush.magic_ids.destination.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
                  field: json.DestinationPort
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: destination.port
      copy_from: cloudflare_logpush.magic_ids.destination.port
      ignore_empty_value: true

  # Handle source IP and port
  - convert:
      field: json.SourceIP
      target_field: cloudflare_logpush.magic_ids.source.ip
      type: ip
      if: ctx.json?.SourceIP != ''
      ignore_missing: true
      on_failure:
        - remove:
                  field: json.SourceIP
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.ip
      copy_from: cloudflare_logpush.magic_ids.source.ip
      ignore_empty_value: true
  # Geo enrichment (source IP)
  - geoip:
      field: source.ip
      target_field: source.geo
      ignore_missing: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
  - rename:
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - convert:
      field: json.SourcePort
      target_field: cloudflare_logpush.magic_ids.source.port
      type: long
      ignore_missing: true
      on_failure:
        - remove:
                  field: json.SourcePort
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: source.port
      copy_from: cloudflare_logpush.magic_ids.source.port
      ignore_empty_value: true

  - rename:
      field: json.Protocol
      target_field: cloudflare_logpush.magic_ids.transport
      ignore_missing: true
  - set:
      field: network.transport
      copy_from: cloudflare_logpush.magic_ids.transport
      ignore_empty_value: true

  - rename:
      field: json.Action
      target_field: cloudflare_logpush.magic_ids.action
      ignore_missing: true
  - set:
      field: event.action
      copy_from: cloudflare_logpush.magic_ids.action
      ignore_empty_value: true
  - append:
      field: event.type
      value: allowed
      allow_duplicates: false
      if: ctx.event?.action == 'pass'
  - append:
      field: event.type
      value: denied
      allow_duplicates: false
      if: ctx.event?.action == 'block'

  # Custom fields
  - rename:
      field: json.ColoCode
      target_field: cloudflare_logpush.magic_ids.colo.code
      ignore_missing: true
  - rename:
      field: json.ColoCity
      target_field: cloudflare_logpush.magic_ids.colo.city
      ignore_missing: true
  - convert:
      field: json.SignatureID
      target_field: cloudflare_logpush.magic_ids.signature.id
      type: long
      ignore_missing: true
      on_failure:
        - remove:
                  field: json.SignatureID
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.SignatureMessage
      target_field: cloudflare_logpush.magic_ids.signature.message
      ignore_missing: true
  - convert:
      field: json.SignatureRevision
      target_field: cloudflare_logpush.magic_ids.signature.revision
      type: long
      ignore_missing: true
      on_failure:
        - remove:
                  field: json.SignatureRevision
            ignore_missing: true
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # Create related fields
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.magic_ids.destination.ip}}}'
      if: ctx.cloudflare_logpush?.magic_ids?.destination?.ip != null
      allow_duplicates: false
  - append:
      field: related.ip
      value: '{{{cloudflare_logpush.magic_ids.source.ip}}}'
      if: ctx.cloudflare_logpush?.magic_ids?.source?.ip != null
      allow_duplicates: false

  # Clean resulting event
  - remove:
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.magic_ids.action
        - cloudflare_logpush.magic_ids.timestamp
        - cloudflare_logpush.magic_ids.destination.ip
        - cloudflare_logpush.magic_ids.destination.port
        - cloudflare_logpush.magic_ids.source.ip
        - cloudflare_logpush.magic_ids.source.port
        - cloudflare_logpush.magic_ids.transport
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
      on_failure:
        - append:
                  field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
