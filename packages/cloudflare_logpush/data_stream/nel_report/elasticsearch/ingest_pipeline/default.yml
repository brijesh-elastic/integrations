---
description: Pipeline for parsing Cloudflare NEL Report logs.
processors:
  - set:
      tag: set_ecs_version_b777da29
      field: ecs.version
      value: '9.3.0'
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      tag: json_event_original_to_json_5e54dc16
      field: event.original
      target_field: json
  - set:
      tag: set_event_category_dbab8a4e
      field: event.category
      value: [network]
  - set:
      tag: set_event_kind_de80643c
      field: event.kind
      value: event
  - set:
      tag: set_event_type_ec95f7f2
      field: event.type
      value: [info]
  ## AWS S3 input does _id Based Deduplication and generates "_id" by default.
  ## When "Data Deduplication" is not enabled, this field must be removed.
  ## https://www.elastic.co/docs/reference/beats/filebeat/filebeat-input-aws-s3#_document_id_generation
  - remove:
      field: _id
      tag: remove_id_based_deduplication
      description: >
        When data deduplication is disabled, the _id field (used for _id Based Deduplication)
        must be removed.
      if: ctx._conf?.enable_deduplication == false && ctx.input?.type == 'aws-s3'
      ignore_missing: true
  - convert:
      tag: convert_json_Timestamp_7242ddce
      field: json.Timestamp
      type: long
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      ignore_failure: true
  - script:
      lang: painless
      tag: painless_timestamp_to_milli
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp instanceof Number
      source: |
        long t = (long)(ctx.json.Timestamp);
        if (t > (long)(1e18)) {
          ctx.json.Timestamp = t/(long)(1e6)
        } else if (t < (long)(1e10))  {
          ctx.json.Timestamp = t*(long)(1e3)
        }
      on_failure:
        - append:
            tag: append_error_message_df40dd8a
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: json.Timestamp
      if: ctx.json?.Timestamp != null && ctx.json.Timestamp != ''
      formats:
        - UNIX_MS
        - ISO8601
        - yyyy-MM-dd'T'HH:mm:ssZ
      timezone: UTC
      tag: date_json_timestamp
      on_failure:
        - remove:
            tag: remove_json_Timestamp_9c461744
            field: json.Timestamp
            ignore_missing: true
        - append:
            tag: append_error_message_ef9ca3c1
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      tag: set_cloudflare_logpush_nel_report_timestamp_26266fd5
      field: cloudflare_logpush.nel_report.timestamp
      copy_from: '@timestamp'
      ignore_empty_value: true
  - rename:
      field: json.Type
      target_field: cloudflare_logpush.nel_report.error.type
      ignore_missing: true
      tag: rename_json_type
  - set:
      field: error.type
      copy_from: cloudflare_logpush.nel_report.error.type
      ignore_empty_value: true
      tag: set_error_type
  - convert:
      field: json.ClientIPASN
      target_field: cloudflare_logpush.nel_report.client.ip.asn.value
      type: long
      ignore_missing: true
      tag: convert_client_ip_asn
      on_failure:
        - remove:
            tag: remove_json_ClientIPASN_6786aab2
            field: json.ClientIPASN
            ignore_missing: true
        - append:
            tag: append_error_message_1fec64e9
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - rename:
      field: json.ClientIPASNDescription
      target_field: cloudflare_logpush.nel_report.client.ip.asn.description
      ignore_missing: true
      tag: rename_client_ip_asn_description
  - rename:
      field: json.ClientIPCountry
      target_field: cloudflare_logpush.nel_report.client.ip.country
      ignore_missing: true
      tag: rename_client_ip_country
  - rename:
      field: json.LastKnownGoodColoCode
      target_field: cloudflare_logpush.nel_report.last_known_good.colo.code
      ignore_missing: true
      tag: rename_last_known_good_colo_code
  - rename:
      field: json.Phase
      target_field: cloudflare_logpush.nel_report.phase
      ignore_missing: true
      tag: rename_phase
  - remove:
      tag: remove_json_conf
      field:
        - json
        - _conf
      ignore_missing: true
  - remove:
      field:
        - cloudflare_logpush.nel_report.timestamp
        - cloudflare_logpush.nel_report.error.type
      if: ctx.tags == null || !(ctx.tags.contains('preserve_duplicate_custom_fields'))
      ignore_missing: true
      tag: remove_duplicated_custom_fields
      on_failure:
        - append:
            tag: append_error_message_eafb8646
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - script:
      tag: script_to_drop_null_values
      lang: painless
      description: This script processor iterates over the whole document to remove fields with null values.
      source: |-
        void handleMap(Map map) {
          map.values().removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        void handleList(List list) {
          list.removeIf(v -> {
            if (v instanceof Map) {
              handleMap(v);
            } else if (v instanceof List) {
              handleList(v);
            }
            return v == null || v == '' || (v instanceof Map && v.size() == 0) || (v instanceof List && v.size() == 0)
          });
        }
        handleMap(ctx);
  - set:
      field: event.kind
      tag: set_pipeline_error_into_event_kind
      value: pipeline_error
      if: ctx.error?.message != null
  - append:
      tag: append_tags_9fe66b2c
      field: tags
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null
on_failure:
  - append:
      field: error.message
      value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
